<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="auth.login_title">Log Masuk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&family=Bricolage+Grotesque:opsz,wdth,wght@12..96,75..100,200..800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="nav-target"></div>

  <div class="page-wrapper">
    <div class="container-narrow" style="padding-top: 4rem; padding-bottom: 2rem;">
      <div class="card" style="max-width: 400px; margin: 0 auto;">
        <h2 class="text-center mb-4" data-i18n="auth.login_title">Log Masuk</h2>

        <form id="login-form">
          <div class="form-group">
            <label class="form-label" data-i18n="auth.login_username">Nama Pengguna</label>
            <input type="text" class="form-input" id="login-username" required autocomplete="username">
          </div>

          <div class="form-group">
            <label class="form-label" data-i18n="auth.login_password">Kata Laluan</label>
            <input type="password" class="form-input" id="login-password" required autocomplete="current-password">
          </div>

          <div id="login-error" class="text-sm" style="color: var(--danger); margin-bottom: 0.75rem;" class="hidden"></div>

          <button type="submit" class="btn btn-primary btn-block btn-lg" data-i18n="auth.login_submit">Log Masuk</button>
        </form>

        <p class="text-center text-sm mt-4 text-muted">
          <span data-i18n="auth.login_no_account">Belum ada akaun?</span>
          <a href="register.html" data-i18n="auth.register_title">Daftar</a>
        </p>
      </div>
    </div>
  </div>

  <div class="toast-container"></div>

  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      App.init();

      // Redirect if already logged in
      if (Auth.isLoggedIn()) {
        const session = Auth.getSession();
        window.location.href = `wall.html?jurusan=${session.jurusan}&aliran=${session.aliran}&sesi=${session.sesi}`;
      }

      document.getElementById('login-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value;
        const errorEl = document.getElementById('login-error');

        const result = Auth.login(username, password);

        if (result.success) {
          const session = result.user;
          window.location.href = `wall.html?jurusan=${session.jurusan}&aliran=${session.aliran}&sesi=${session.sesi}`;
        } else {
          errorEl.textContent = result.error;
          errorEl.classList.remove('hidden');
        }
      });
    });
  </script>
</body>
</html>
