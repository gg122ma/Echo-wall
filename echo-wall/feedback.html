<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="feedback.title">Maklum Balas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&family=Bricolage+Grotesque:opsz,wdth,wght@12..96,75..100,200..800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="nav-target"></div>

  <div class="page-wrapper">
    <div class="container-narrow" style="padding: 2rem 1rem;">
      <div id="feedback-form-view">
        <h2 class="text-center mb-3" data-i18n="feedback.title">Maklum Balas Anda</h2>
        <p class="text-center text-muted mb-4" data-i18n="feedback.subtitle">
          Bantu kami tingkatkan Echo Wall untuk komuniti.
        </p>

        <div class="card">
          <!-- Star Rating -->
          <div class="form-group text-center">
            <label class="form-label" data-i18n="feedback.rating">Bagaimana Echo Wall membantu anda?</label>
            <div class="star-rating" id="star-rating" style="font-size: 2rem; cursor: pointer; display: inline-flex; gap: 4px;">
              <span data-rating="1">☆</span>
              <span data-rating="2">☆</span>
              <span data-rating="3">☆</span>
              <span data-rating="4">☆</span>
              <span data-rating="5">☆</span>
            </div>
            <div class="form-hint text-center" id="rating-label">0 / 5</div>
          </div>

          <!-- What helped (multi-select) -->
          <div class="form-group">
            <label class="form-label" data-i18n="feedback.what_helped">Apa yang paling membantu?</label>
            <div class="checkbox-group" style="flex-direction: column; align-items: flex-start; gap: 0.5rem;">
              <label style="font-size: 0.875rem;"><input type="checkbox" value="tips-belajar"> <span data-i18n="feedback.tips_belajar">Tips belajar</span></label>
              <label style="font-size: 0.875rem;"><input type="checkbox" value="jurusan-choice"> <span data-i18n="feedback.jurusan_choice">Pilihan jurusan/aliran</span></label>
              <label style="font-size: 0.875rem;"><input type="checkbox" value="motivation"> <span data-i18n="feedback.motivation">Motivasi</span></label>
              <label style="font-size: 0.875rem;"><input type="checkbox" value="community"> <span data-i18n="feedback.community">Rasa komuniti</span></label>
            </div>
          </div>

          <!-- Name (optional) -->
          <div class="form-group">
            <label class="form-label">Nama (pilihan)</label>
            <input type="text" class="form-input" id="fb-nama" placeholder="Nama anda...">
          </div>

          <!-- Suggestion -->
          <div class="form-group">
            <label class="form-label" data-i18n="feedback.suggestion">Cadangan penambahbaikan</label>
            <textarea class="form-textarea" id="fb-suggestion" rows="3"
                      data-i18n-placeholder="feedback.suggestion"
                      placeholder="Cadangan anda..."></textarea>
          </div>

          <button class="btn btn-primary btn-block btn-lg mt-3" id="btn-submit-feedback" data-i18n="feedback.submit">
            Hantar Maklum Balas
          </button>
        </div>
      </div>

      <!-- Thank you view (hidden by default) -->
      <div id="feedback-thanks" class="card text-center hidden" style="padding: 3rem 1.5rem; margin-top: 2rem;">
        <div style="font-size: 3rem; margin-bottom: 1rem;">🎉</div>
        <h2 data-i18n="feedback.submitted">Terima kasih atas maklum balas anda!</h2>
        <p class="text-muted mt-2" data-i18n="feedback.submitted_msg">
          Masukan anda membantu menjadikan Echo Wall lebih baik untuk semua.
        </p>
        <a href="index.html" class="btn btn-primary mt-4" data-i18n="feedback.back_home">Kembali ke Utama</a>
      </div>
    </div>
  </div>

  <div class="toast-container"></div>

  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/feedback.js"></script>
  <script src="js/app.js"></script>
  <script>
    let selectedRating = 0;

    document.addEventListener('DOMContentLoaded', () => {
      App.init();

      // Star rating
      const stars = document.querySelectorAll('#star-rating span');
      const ratingLabel = document.getElementById('rating-label');

      stars.forEach(star => {
        star.addEventListener('mouseenter', () => {
          const rating = parseInt(star.dataset.rating);
          highlightStars(rating);
        });

        star.addEventListener('click', () => {
          selectedRating = parseInt(star.dataset.rating);
          highlightStars(selectedRating);
          ratingLabel.textContent = selectedRating + ' / 5';
        });
      });

      document.getElementById('star-rating').addEventListener('mouseleave', () => {
        highlightStars(selectedRating);
      });

      function highlightStars(rating) {
        stars.forEach(s => {
          const r = parseInt(s.dataset.rating);
          s.textContent = r <= rating ? '★' : '☆';
          s.style.color = r <= rating ? '#f59e0b' : '';
        });
      }

      // Submit
      document.getElementById('btn-submit-feedback').addEventListener('click', () => {
        if (selectedRating === 0) {
          App.showToast('Sila pilih bintang terlebih dahulu.');
          return;
        }

        const checkboxes = document.querySelectorAll('#feedback-form-view input[type="checkbox"]:checked');
        const pilihan = Array.from(checkboxes).map(cb => cb.value);

        Feedback.submit({
          nama: document.getElementById('fb-nama').value.trim(),
          rating: selectedRating,
          pilihan,
          cadangan: document.getElementById('fb-suggestion').value.trim(),
          userId: Auth.getSession()?.id || ''
        });

        // Show thank you
        document.getElementById('feedback-form-view').classList.add('hidden');
        document.getElementById('feedback-thanks').classList.remove('hidden');
      });
    });
  </script>
</body>
</html>
