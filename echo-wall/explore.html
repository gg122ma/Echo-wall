<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="explore.title">Teroka Dinding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&family=Bricolage+Grotesque:opsz,wdth,wght@12..96,75..100,200..800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="nav-target"></div>

  <div class="page-wrapper">
    <div class="container-narrow" style="padding: 2rem 1rem;">
      <h2 class="text-center mb-4" data-i18n="explore.title">Teroka Dinding</h2>
      <p class="text-center text-muted mb-4" data-i18n="explore.subtitle">
        Pilih jurusan, aliran, dan sesi anda untuk mencari nota yang relevan.
      </p>

      <div class="card">
        <div class="form-group">
          <label class="form-label" data-i18n="explore.select_jurusan">Pilih Jurusan</label>
          <select class="form-select" id="explore-jurusan">
            <option value="">-- Pilih Jurusan --</option>
            <option value="sains">Sains</option>
            <option value="sains-komputer">Sains Komputer</option>
            <option value="kejuruteraan">Kejuruteraan</option>
            <option value="perakaunan">Perakaunan</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" data-i18n="explore.select_aliran">Pilih Aliran</label>
          <select class="form-select" id="explore-aliran" disabled>
            <option value="">-- Pilih Jurusan dulu --</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" data-i18n="explore.select_sesi">Pilih Sesi</label>
          <select class="form-select" id="explore-sesi">
            <option value="">-- Pilih Sesi --</option>
            <option value="2024-2025">2024/2025</option>
            <option value="2025-2026">2025/2026</option>
            <option value="2026-2027">2026/2027</option>
          </select>
        </div>

        <button class="btn btn-primary btn-block btn-lg mt-4" id="btn-go-wall" disabled data-i18n="explore.go_to_wall">
          Pergi ke Dinding
        </button>
      </div>
    </div>
  </div>

  <div class="toast-container"></div>

  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    const JURUSAN_ALIRAN = {
      'sains': [
        { value: 'sains-hayat', label: 'Sains Hayat' },
        { value: 'sains-fizikal', label: 'Sains Fizikal' },
        { value: 'sains-teknologi', label: 'Sains Teknologi' }
      ],
      'sains-komputer': [
        { value: 'sains-komputer', label: 'Sains Komputer' }
      ],
      'kejuruteraan': [
        { value: 'asas-kejuruteraan', label: 'Asas Kejuruteraan' },
        { value: 'kejuruteraan-awam', label: 'Kejuruteraan Awam' },
        { value: 'kejuruteraan-elektrik', label: 'Kejuruteraan Elektrik & Elektronik' },
        { value: 'kejuruteraan-mekanikal', label: 'Kejuruteraan Mekanikal' }
      ],
      'perakaunan': [
        { value: 'perakaunan', label: 'Perakaunan' },
        { value: 'perakaunan-profesional', label: 'Perakaunan Profesional (JPPro)' }
      ]
    };

    document.addEventListener('DOMContentLoaded', () => {
      App.init();

      const jurusanSel = document.getElementById('explore-jurusan');
      const aliranSel = document.getElementById('explore-aliran');
      const sesiSel = document.getElementById('explore-sesi');
      const goBtn = document.getElementById('btn-go-wall');

      jurusanSel.addEventListener('change', () => {
        const j = jurusanSel.value;
        aliranSel.innerHTML = '<option value="">-- Pilih Aliran --</option>';

        if (j && JURUSAN_ALIRAN[j]) {
          aliranSel.disabled = false;
          JURUSAN_ALIRAN[j].forEach(a => {
            const opt = document.createElement('option');
            opt.value = a.value;
            opt.textContent = a.label;
            aliranSel.appendChild(opt);
          });
        } else {
          aliranSel.disabled = true;
        }
        checkReady();
      });

      aliranSel.addEventListener('change', checkReady);
      sesiSel.addEventListener('change', checkReady);

      function checkReady() {
        goBtn.disabled = !jurusanSel.value || !aliranSel.value || !sesiSel.value;
      }

      goBtn.addEventListener('click', () => {
        const j = jurusanSel.value;
        const a = aliranSel.value;
        const s = sesiSel.value;
        window.location.href = `wall.html?jurusan=${j}&aliran=${a}&sesi=${s}`;
      });
    });
  </script>
</body>
</html>
